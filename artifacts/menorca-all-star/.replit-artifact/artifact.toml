kind = "web"
previewPath = "/"
title = "Menorca All Star"
version = "1.0.0"
id = "artifacts/menorca-all-star"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24242

[services.development]
run = "pnpm --filter @workspace/menorca-all-star run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/menorca-all-star", "run", "build" ]
publicDir = "artifacts/menorca-all-star/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24242"
BASE_PATH = "/"
